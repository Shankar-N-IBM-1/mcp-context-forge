[pytest]
markers =
    smoke: Quick validation tests that run in < 30 seconds
    ui: UI interaction tests
    api: API endpoint tests through the UI
    e2e: Full end-to-end workflows
    slow: Tests that take > 1 minute
    auth: Authentication and authorization tests
    crud: Create, Read, Update, Delete operation tests
    htmx: HTMX interaction tests
    integration: Integration tests
    gateways: Gateway management tests
    rbac: RBAC permission enforcement tests
    playwright_security_e2e: Browser-driven security end-to-end scenarios
    iframe: Tests that run inside an iframe context
    regression: Regression tests for previously fixed bugs
    security: Security-focused tests
    flaky: Marks tests as flaky and reruns them
    tools: MCP Tools management tests
    prompts: MCP Prompts management tests
    resources: MCP Resources management tests
    agents: A2A Agents management tests
    owasp_a01: OWASP A01 Broken Access Control security tests
    proxy: Proxy and URL context tests
